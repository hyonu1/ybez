      "원주":["서울","대전","청주"],"춘천":["서울"],"강릉":["서울","원주"],
      "속초":["서울","강릉"],"동해":["강릉","원주"],"삼척":["강릉","동해"],
      "태백":["원주","강릉"],"정선":["원주","강릉"],"영월":["원주","제천"],
      "평창":["원주","강릉"],"홍천":["서울","원주","춘천"],"횡성":["원주"],
      "인제":["춘천","서울"],"양양":["강릉","속초"],"고성":["속초","강릉"],
      "양구":["춘천","서울"],
      // 수도권
      "서울":["광주","대전","전주"],"동서울":["광주","대전"],"센트럴시티":["광주","대전","전주"],
      "서울경부":["광주","대전","전주"],"서울남부":["광주","대전"],
      "인천":["서울","대전"],"수원":["서울","대전"],"성남":["서울"],
      "고양":["서울"],"안양":["서울"],"부천":["서울","인천"],
      "안산":["서울","수원"],"평택":["천안","대전","수원"],
      "경기광주":["서울","성남"],"이천":["서울","수원"],"여주":["서울","원주"],
      "안성":["평택","천안"],"의정부":["서울"],"포천":["서울"],
      "가평":["서울","춘천"],"동두천":["서울","의정부"],"오산":["수원","평택"],"양평":["서울","원주"],
      // 울산
      "울산":["부산","동대구"],
    };

    /* 요금 조회: JNE 대표노드 → CANON_NODES → alias_linked → routesDB */
    const lf=(a,b)=>{
      const jneFast=makeJnePrimaryCandidate(a,b);
      if(jneFast)return {...jneFast,from:a,to:b,_dx:jneFast.depId,_dy:jneFast.arrId};
      const toNd=(city)=>{
        // MEGA_MAIN 노드를 반드시 맨 앞에 포함 (청주고속 등 누락 방지)
        const mega=MEGA_MAIN[city]?[MEGA_MAIN[city]]:[];
        const canon=CANON_NODES[city]||[];
        const e=aliasLinked?aliasLinked[city]:null;
        const fromAlias=(e&&e.node_ids&&e.node_ids.length)?e.node_ids.slice(0,6):[];
        return[...new Set([...mega,...canon,...fromAlias])].filter(Boolean).slice(0,8)||[city];
      };
      const an=toNd(a),bn=toNd(b);
      const megaA=MEGA_MAIN[a],megaB=MEGA_MAIN[b];
      let best=null;
      for(const x of an){for(const y of bn){
        const k1=x+"_"+y;
        const k2=y+"_"+x;
        const rt=routesDB?(routesDB[k1]||routesDB[k2]):null;
        if(rt&&rt.fares){
          const gen=rt.fares["일반"]||rt.fares["고속"]||rt.fares["우등"]||null;
          if(!gen)continue;
          const isMegaDep=megaA&&x===megaA;
          const isMegaArr=megaB&&y===megaB;
          const bestIsMegaDep=best&&megaA&&best._dx===megaA;
          const bestIsMegaArr=best&&megaB&&best._dy===megaB;
          // 이미 MEGA_MAIN dep 결과 있으면 non-MEGA dep는 무시
          if(bestIsMegaDep&&!isMegaDep)continue;
          // MEGA_MAIN dep 우선, 아니면 단순 최저가
          if(!best||((isMegaDep&&!bestIsMegaDep))||(gen<best.gen&&!(bestIsMegaDep&&!isMegaDep))){
            best={
              gen,pre:rt.fares["우등"]||null,
              sources:rt.sources||[],dr:rt.display_route||a+"→"+b,
              from:a,to:b,_dx:x,_dy:y,
              depName: getNodeName(x, a),
              arrName: getNodeName(y, b)
            };
          }
        }
      }}
      if(!best&&JNE_FARES){
        const fa=(a||"").trim(),fb=(b||"").trim();
        const jne=JNE_FARES[fa]?.[fb]||JNE_FARES[fb]?.[fa]||null;
        if(jne)best={...jne,sources:["JNE2026"],dr:a+"→"+b,from:a,to:b,depName:a,arrName:b};
      }
      return best;
    };

    // ── route_overrides 보정층 초기화 ─────────────────────────────
    // living_areas에서 area명 → 대표 도시 매핑 구성 (광주권 → 광주, 전주권 → 전주 등)
    const AREA_TO_HUB={"광주권":"광주","목포권":"목포","전주권":"전주","여순광권":"순천",
      "대구권":"동대구","부산권":"부산","서울권":"서울","춘천권":"춘천","원주권":"원주",
      "대전권":"대전","인천권":"인천"};
    // routeOverridesDB.preferred_hubs에서 area명을 실제 도시명으로 해석해 PREFERRED_HUBS 보강
    const overPH=routeOverridesDB?.preferred_hubs||{};
    for(const [city,areaList] of Object.entries(overPH)){
      if(!PREFERRED_HUBS[city])PREFERRED_HUBS[city]=[];
      for(const area of areaList){
        const hub=AREA_TO_HUB[area]||area;
        if(!PREFERRED_HUBS[city].includes(hub))PREFERRED_HUBS[city].push(hub);
      }
    }
    // penalties from route_ranking_rules
    const PENALTIES=routeOverridesDB?.route_ranking_rules?.penalties||{};
    // excluded_sub_nodes: 대표로 쓰이면 패널티
    const rawExcluded=routeOverridesDB?.excluded_sub_nodes||{};
    const EXCL_SUBS=new Set(
      Array.isArray(rawExcluded)
        ? rawExcluded.map(n=>typeof n==="string"?n:(n?.city||n?.display_name||n?.node_id||""))
        : Object.entries(rawExcluded).flatMap(([nodeId,n])=>[nodeId,n?.city,n?.display_name,n?.parent_area].filter(Boolean))
    );
    // preferred_axes: from/to 지역이 매칭되면 선호허브 맞춤 처리
    const PREF_AXES=routeOverridesDB?.route_ranking_rules?.preferred_axes||[];

    const scoreRoute=(path,segs,tot)=>{
      const fcrd=gcrd(fc),tcrd=gcrd(tc);
      let s=tot;
      const transfers=segs.length-1;
      if(transfers===1)s+=10000;
      else if(transfers===2)s+=100000;
      else if(transfers>=3)s+=1000000;

      const directKm=hav(fcrd.lat,fcrd.lng,tcrd.lat,tcrd.lng);
      let routeKm=0;
      for(let i=0;i<path.length-1;i++){
        const a=gcrd(path[i]),b=gcrd(path[i+1]);
        if(a&&b)routeKm+=hav(a.lat,a.lng,b.lat,b.lng);
      }
      if(directKm>0&&routeKm>directKm*3)s+=10000000;

      const dx=tcrd.lng-fcrd.lng,dy=tcrd.lat-fcrd.lat;
      const directDeg=Math.sqrt(dx*dx+dy*dy)||1;
      for(let i=1;i<path.length-1;i++){
        const h=path[i];
        const hcrd=gcrd(h);
        const cos=cosDir(fcrd,tcrd,hcrd);

        if(!seoulOK&&SEOUL.has(h))s+=30000;
        if(!ALL_HUBS.has(h))s+=8000;
        if(cos<0)s+=10000000;

        const offLine=distToLine(fcrd,tcrd,hcrd);
        // PREFERRED_HUBS에 명시된 허브는 직선이탈 패널티 면제
        const isPrefHub=(PREFERRED_HUBS[fc]||[]).includes(h)||(PREFERRED_HUBS[tc]||[]).includes(h);
        if(offLine>directDeg*0.45&&!isPrefHub)s+=10000000;
        s-=getBonus(h,fc,tc);

        // ── route_overrides.json 패널티 적용 ──────────────────────
        // 서울 불필요 우회: 남부지역→영남에서 서울 경유
        if(PENALTIES.unnecessary_seoul_for_south_to_yeongnam){
          const southJg=REGION["광주"]||[];
          const yeongnam=[...(REGION["부산"]||[]),...(REGION["대구"]||[])];
          if((southJg.includes(fc)||fc==="광주")&&yeongnam.includes(tc)&&SEOUL.has(h)){
            s+=PENALTIES.unnecessary_seoul_for_south_to_yeongnam*1000;
          }
        }
        // 같은 생활권인데 전국 허브 경유: 과패널티
        if(PENALTIES.same_living_area_via_national_hub){
          const bothInGwangju=(REGION["광주"]||[]).includes(fc)&&(REGION["광주"]||[]).includes(tc);
          if(bothInGwangju&&(h==="서울"||h==="부산"||h==="동대구")){
            s+=PENALTIES.same_living_area_via_national_hub*1000;
          }
        }
        // excluded_sub_nodes 패널티
        if(EXCL_SUBS.has(h)&&PENALTIES.uses_excluded_sub_node_as_representative){
          s+=PENALTIES.uses_excluded_sub_node_as_representative*1000;
        }
      }

      // preferred_axes 처리: 축에 맞는 경우 보너스, 기피허브 경유 시 패널티
      for(const ax of PREF_AXES){
        const fromMatch=(ax.from_regions||[]).some(r=>r===fc||(AREA_TO_HUB[r]===fc)||(REGION[AREA_TO_HUB[r]||r]||[]).includes(fc));
        if(!fromMatch)continue;
        const avoidHubs=ax.avoid_hubs||[];
        const mids=path.slice(1,-1);
        for(const mid of mids){
          const midHub=AREA_TO_HUB[mid]||mid;
          if(avoidHubs.includes(mid)||avoidHubs.some(ah=>AREA_TO_HUB[ah]===mid)){
            s+=40000; // 기피허브 경유 패널티
          }
        }
        // preferred_hubs 경유 시 보너스
        const prefHubs=ax.preferred_hubs||[];
        for(const mid of mids){
          if(prefHubs.includes(mid)||prefHubs.some(ph=>AREA_TO_HUB[ph]===mid)){
            s-=5000;
          }
        }
      }

      if(s>=1000000)s+=10000000;
      return s;
    };

    const routeList=[];
    const addRoute=(path,segs)=>{
      if(!segs||segs.length===0)return;
      if(segs.length>4)return;
      const tot=segs.reduce((s,sg)=>s+(sg.gen||0),0);
      if(tot===0)return;
      routeList.push({path,segs,totalGen:tot,transfers:segs.length-1,
                       totalOpt:scoreRoute(path,segs,tot)});
    };

    /* 1단계: 직통 */
    const fcrd=gcrd(fc)||{lat:35.5,lng:127.5};const tcrd=gcrd(tc)||{lat:35.5,lng:127.5};
    const fg=getCityGroup(fc);const tg=getCityGroup(tc);
    const MEGA_KEYS=new Set(Object.keys(MEGA_MAIN));

    // ① 직통 확인
    const d=lf(fc,tc);
    if(d){
      addRoute([fc,tc],[{...d,from:fc,to:tc}]);
      if(routeList.length>0){
        const direct=routeList[0];
        return{cheapest:direct,optimal:direct,same:true,routes:[direct]};
      }
    }

    // ② 방향 기준 중간허브 후보 
    const HUB_CANDIDATES=["광주","대전","서울","센트럴시티","동서울","대구","동대구","부산","전주","진주","천안","순천","목포","원주","강릉","청주","창원","세종","춘천","수원","인천","울산"];
    const scoreHub=(h)=>{
      const hcrd=gcrd(h)||{lat:35.5,lng:127.5};
      const dx=tcrd.lng-fcrd.lng, dy=tcrd.lat-fcrd.lat;
      const cx=hcrd.lng-fcrd.lng, cy=hcrd.lat-fcrd.lat;
      return dx*cx+dy*cy;
    };
    const validHubs=HUB_CANDIDATES.filter(h=>h!==fc&&h!==tc&&scoreHub(h)>0)
      .sort((a,b)=>scoreHub(b)-scoreHub(a));

    // ③ 직통 없으면 허브 1개 경유 
    for(const h of validHubs.slice(0,8)){
      const s1=lf(fc,h),s2=lf(h,tc);
      if(s1&&s2)addRoute([fc,h,tc],[{...s1,from:fc,to:h},{...s2,from:h,to:tc}]);
    }

    // ④ 허브 2개 경유
    for(let i=0;i<Math.min(validHubs.length,6);i++){
      const h1=validHubs[i];
      const s1=lf(fc,h1);if(!s1)continue;
      const h1crd=gcrd(h1)||{lat:35.5,lng:127.5};
      for(let j=0;j<Math.min(validHubs.length,6);j++){
        if(i===j)continue;
        const h2=validHubs[j];
        const h2crd=gcrd(h2)||{lat:35.5,lng:127.5};
        const d2x=tcrd.lng-h1crd.lng,d2y=tcrd.lat-h1crd.lat;
        const c2x=h2crd.lng-h1crd.lng,c2y=h2crd.lat-h1crd.lat;
        if(d2x*c2x+d2y*c2y<=0)continue;
        const s12=lf(h1,h2);if(!s12)continue;
        const s2=lf(h2,tc);if(!s2)continue;
        addRoute([fc,h1,h2,tc],[{...s1,from:fc,to:h1},{...s12,from:h1,to:h2},{...s2,from:h2,to:tc}]);
      }
    }

    // ⑤ HUB_GROUPS 보완
    if(fg){for(const fhub of fg.hubs){
      if(fhub===fc||scoreHub(fhub)<=0)continue;
      const sf=lf(fc,fhub);if(!sf)continue;
      const sd=lf(fhub,tc);
      if(sd)addRoute([fc,fhub,tc],[{...sf,from:fc,to:fhub},{...sd,from:fhub,to:tc}]);
      if(tg){for(const th of tg.hubs){
        if(th===fhub)continue;
        const s12=lf(fhub,th),s2t=lf(th,tc);
        if(s12&&s2t)addRoute([fc,fhub,th,tc],[{...sf,from:fc,to:fhub},{...s12,from:fhub,to:th},{...s2t,from:th,to:tc}]);
      }}
    }}

    // ⑥ PREFERRED_HUBS
    const fPref=PREFERRED_HUBS[fc]||[];
    const tPref=PREFERRED_HUBS[tc]||[];
    const natHubs=["광주","대전","서울","센트럴시티","동서울","전주","부산","대구","동대구","순천","천안","청주","원주","강릉","진주","창원","세종","춘천"];

    // 6-1. fc → fPref → tc
    for(const ph of fPref){
      if(ph===fc||ph===tc)continue;
      const sp=lf(fc,ph);if(!sp)continue;
      const sd=lf(ph,tc);
      if(sd)addRoute([fc,ph,tc],[{...sp,from:fc,to:ph},{...sd,from:ph,to:tc}]);
      // fc → fPref → nh → tc (3단)
      for(const nh of natHubs){
        if(nh===ph||nh===tc||nh===fc)continue;
        const sph=lf(ph,nh),snd=lf(nh,tc);
        if(sph&&snd)addRoute([fc,ph,nh,tc],[{...sp,from:fc,to:ph},{...sph,from:ph,to:nh},{...snd,from:nh,to:tc}]);
      }
    }
    // 6-2. fc → tPref → tc
    for(const ph of tPref){
      if(ph===fc||ph===tc)continue;
      const sp=lf(ph,tc);if(!sp)continue;
      const sf=lf(fc,ph);
      if(sf)addRoute([fc,ph,tc],[{...sf,from:fc,to:ph},{...sp,from:ph,to:tc}]);
      // fc → nh → tPref → tc (3단)
      for(const nh of natHubs){
        if(nh===ph||nh===fc||nh===tc)continue;
        const sfn=lf(fc,nh),snh=lf(nh,ph);
        if(sfn&&snh)addRoute([fc,nh,ph,tc],[{...sfn,from:fc,to:nh},{...snh,from:nh,to:ph},{...sp,from:ph,to:tc}]);
      }
    }
    // 6-3. fc → fPref → tPref → tc — 핵심! 해남→광주→대구→안동
    for(const fph of fPref){
      if(fph===fc||fph===tc)continue;
      const sf=lf(fc,fph);if(!sf)continue;
      for(const tph of tPref){
        if(tph===fph||tph===fc||tph===tc)continue;
        const smid=lf(fph,tph);if(!smid)continue;
        const st=lf(tph,tc);if(!st)continue;
        addRoute([fc,fph,tph,tc],[{...sf,from:fc,to:fph},{...smid,from:fph,to:tph},{...st,from:tph,to:tc}]);
      }
    }

    if(!routeList.length)return null;

    const usable=[...routeList]
      .filter(r=>(r.totalOpt||r.totalGen)<1000000)
      .sort((a,b)=>a.totalOpt-b.totalOpt)
      .slice(0,2);

    if(!usable.length)return null;

    const cheapest=[...usable].sort((a,b)=>a.totalGen-b.totalGen)[0];
    const optimal=usable[0];
    const same=cheapest.path.join("→")===optimal.path.join("→");
    return{cheapest,optimal,same,routes:usable};
  },[getCityCoord, getNodeName, aliasLinked, routesDB, makeJnePrimaryCandidate]);

  /* 하위터미널 탐색 - 출발/도착 모두, 전남 권역만 */
  const findSubResults=useCallback((fromCity,toCity)=>{
    if(!aliasLinked||!routesDB)return{depSubs:[],arrSubs:[]};
    const fc=nz(fromCity);const tc=nz(toCity);
    const isJneFrom=isJNE(fc);const isJneTo=isJNE(tc);
    const fEntry=aliasLinked[fc];const tEntry=aliasLinked[tc];
    const mainFNodes=new Set(resolveNodes(fromCity));
    const mainTNodes=new Set(resolveNodes(toCity));
    const PREF=PREF_SRC;

    const makeSub=(depId,arrId,depLabel,arrLabel)=>{
      if(!depId||!arrId||depId===arrId)return null;
      const[a,b]=[depId,arrId].sort();
      const rt=routesDB[`${a}_${b}`];
      if(!rt?.fares)return null;
      const gen=rt.fares["일반"]||rt.fares["고속"]||null;
      const pre=rt.fares["우등"]||rt.fares["프리미엄"]||null;
      if(!gen)return null;
      const ss=rt.sources||[];
      const hasPref=ss.some(s=>PREF.has(s));
      const ds=hasPref?ss.filter(s=>PREF.has(s)):ss;
      return{depName:depLabel,arrName:arrLabel,gen,pre,sources:ds};
    };

    const depSubs=[];
    const arrSubs=[];

    if(isJneFrom&&fEntry?.terminals){
      for(const termName of fEntry.terminals){
        if(nz(termName)===fc)continue;
        const subId=TERM_NODE[nz(termName)]||name2node[nz(termName)];
        if(!subId||mainFNodes.has(subId))continue;
        for(const arr of mainTNodes){
          const r=makeSub(subId,arr,termName,nodesMap?.[arr]?.display_name||tc);
          if(r){depSubs.push(r);break;}
        }
      }
    }

    if(isJneTo&&tEntry?.terminals){
      for(const termName of tEntry.terminals){
        if(nz(termName)===tc)continue;
        const subId=TERM_NODE[nz(termName)]||name2node[nz(termName)];
        if(!subId||mainTNodes.has(subId))continue;
        for(const dep of mainFNodes){
          const r=makeSub(dep,subId,nodesMap?.[dep]?.display_name||fc,termName);
          if(r){arrSubs.push(r);break;}
        }
      }
    }

    return{
      depSubs:depSubs.sort((a,b)=>a.gen-b.gen).slice(0,4),
      arrSubs:arrSubs.sort((a,b)=>a.gen-b.gen).slice(0,4)
    };
  },[aliasLinked,routesDB,nodesMap,resolveNodes,name2node]);

  /* 주 계산 */
  const calcSegment=useCallback((fromRaw,toRaw)=>{
    const from=nz(fromRaw);const to=nz(toRaw);
    if(!from||!to)return null;
    const fromI=ISLAND_DB[from];const toI=ISLAND_DB[to];
    let sFrom=from,sTo=to,surcharge=0,shipCost=0;
    if(fromI){sFrom=fromI.hub;shipCost+=(fromI.shipCost||0);surcharge+=(fromI.cost||0);}
    if(toI){sTo=toI.hub;shipCost+=(toI.shipCost||0);surcharge+=(toI.cost||0);}

    if(sFrom===sTo){
      const hasActual=shipCost>0||surcharge>0;
      if(!hasActual)return{cost:0,gen:0,pre:null,surcharge:0,shipCost:0,sameArea:true};
      // 같은 허브권 내 도서 (터미널명 추출)
      const lDep = getNodeName(MEGA_MAIN[sFrom] || aliasLinked?.[sFrom]?.main_node, sFrom);
      const islandMeta=buildIslandLegs(from,to,fromI,toI, lDep, lDep);
      
      return{cost:surcharge,gen:0,pre:null,surcharge,shipCost,sameArea:false,isShip:shipCost>0,
             dr:islandMeta.routeLabel||`${from}→${to}`,sources:[shipCost>0?"ferry":"rural"],depId:null,arrId:null,
             islandLegs:islandMeta.legs,islandRouteLabel:islandMeta.routeLabel,landLabel:islandMeta.landLabel};
    }

    const bd=lookupFare(sFrom,sTo);
    if(!bd)return null;

    // [수정] 터미널 명칭 기반으로 도서-육지 구간 문자열 렌더링
    const landDepName = bd.depName || sFrom;
    const landArrName = bd.arrName || sTo;
    const islandMeta = buildIslandLegs(from, to, fromI, toI, landDepName, landArrName);

    const rawDr=bd.dr||`${sFrom}→${sTo}`;
    const cleanDr=(rawDr.split('↔').length===2&&rawDr.split('↔')[0]===rawDr.split('↔')[1])?`${from}→${to}`:rawDr;

    return{
           ...bd, // includes depName, arrName
           cost:bd.gen+surcharge,gen:bd.gen,pre:bd.pre||null,surcharge,shipCost,sources:bd.sources||[],dr:cleanDr,
           islandLegs:islandMeta.legs,islandRouteLabel:islandMeta.routeLabel,landLabel:islandMeta.landLabel
          };
  },[lookupFare, getNodeName, aliasLinked]);

  const performCalc=useCallback((o=origin,d=dest,viaCity=via,skipPopup=false)=>{
    resetDed();
    setResult(null);
    setSmartResult(null);
    setSubResults({depSubs:[],arrSubs:[]});
    setSelSub(null);
    setIslandPrompt(null);
    setBypassInfo([]);
    setAltRoutes([]);
    setShipFare(0);
    setManualTransport(null);
    let rawFrom=nz(o);let rawTo=nz(d);
    const from=normalizeCity(rawFrom);const to=normalizeCity(rawTo);
    
    if(!viaCity && !skipPopup){
      // 신안/완도는 직접 입력했을 때만 세부지역 선택 팝업을 먼저 띄운다.
      // 팝업에서 "완도" 자체를 선택한 경우에는 skipPopup=true로 들어오므로 재팝업/무한루프를 막는다.
      if(rawFrom&&POPUP[rawFrom]&&popupResolvedRef.current.origin!==rawFrom){openIslandPopup("origin",rawFrom);return;}
      if(rawTo&&POPUP[rawTo]&&popupResolvedRef.current.destination!==rawTo){openIslandPopup("destination",rawTo);return;}
    }

    if(!from||!to){setCalcSt("idle");setResult(null);return;}
    
    if(from&&to&&from===to){
      const zeroRes={gen:0,pre:null,cost:0,surcharge:0,shipCost:0,sources:["zone"],dr:`${from}→${to}`,routeLabel:`${from} 내부 이동`,origin:from,dest:to,via:null,multiHop:null,sameArea:true,zeroReason:"same_city"};
      setResult(zeroRes);setManualTransport(0);setShipFare(0);setCalcSt("done");addHistory(o,d,0);return;
    }
    for(const g of SAME_AREA)if(g.has(from)&&g.has(to)){setIntraCityOpen(true);setCalcSt("idle");return;}
    setCalcSt("working");
    setTimeout(()=>{
      try{
      const viaN=nz(viaCity);

      let sFrom = from; let sTo = to; let bInfo = [];

      const directProbe = !viaN ? calcSegment(from,to) : null;
      const hasOriginalDirect = !!(directProbe && !directProbe.sameArea);

      if(!hasOriginalDirect && BYPASS_DICT[from]){ sFrom=BYPASS_DICT[from]; bInfo.push(`✓ [${sFrom}] 광역환승구역 (출발지 ${sFrom} 기준 적용)`); }
      if(!hasOriginalDirect && BYPASS_DICT[to]){ sTo=BYPASS_DICT[to]; bInfo.push(`✓ [${sTo}] 광역환승구역 (${sTo} 종착 요금 적용)`); }
      setBypassInfo(bInfo);

      let res=null;
      if(!viaN){
        const mainResult=lookupRouteWithAlternatives(sFrom,sTo);
        if(mainResult){setAltRoutes(mainResult.alternatives||[]);}
        else{setAltRoutes([]);}

        const seg=calcSegment(sFrom,sTo);
        if(seg&&!seg.sameArea){
          const isIslandTrip = !!(ISLAND_DB[from] || ISLAND_DB[to]);
          const jneMain = JNE_FARES[sFrom]?.[sTo] || JNE_FARES[sTo]?.[sFrom];
          const validPrimary = (!isIslandTrip && mainResult?.primary) ? mainResult.primary : null;
          
          const displayGen = jneMain ? jneMain.gen : (validPrimary ? validPrimary.gen : seg.gen);
          const displayPre = jneMain ? (jneMain.pre || null) : (validPrimary ? validPrimary.pre : seg.pre);
          const displayDr = seg.dr || `${sFrom}→${sTo}`;
          
          // JNE 요금 적용 시 대표 메인노드명으로 routeLabel 강제 정렬
          // (광주비아, 영산포 등 하위터미널이 메인 요금창에 승격되는 문제 방지)
          const jneDepName = jneMain ? sFrom : null;
          const jneArrName = jneMain ? sTo   : null;
          const displayRouteLabel = seg.islandRouteLabel
            || (validPrimary ? `${validPrimary.depName || sFrom} → ${validPrimary.arrName || sTo}`
            : (jneDepName ? `${jneDepName} → ${jneArrName}` : `${seg.depName || sFrom} → ${seg.arrName || sTo}`));

          res = {
            ...seg,
            gen: displayGen,
            pre: displayPre,
            cost: displayGen + seg.surcharge,
            origin: from,
            dest: to,
            via: null,
            routeLabel: displayRouteLabel,
            dr: displayDr,
            multiHop: null,
            sources: jneMain ? ["JNE2026", ...(seg.sources || [])] : (seg.sources || [])
          };
          setManualTransport((displayGen+seg.surcharge)*2);
          setShipFare(seg.shipCost*2);
        } else if(!seg||seg.sameArea){
          const jne=JNE_FARES[sFrom]?.[sTo]||JNE_FARES[sTo]?.[sFrom];
          if(jne){
            res={gen:jne.gen,pre:jne.pre||null,cost:jne.gen,surcharge:0,shipCost:0,
                 sources:["JNE2026"],dr:`${sFrom}→${sTo}`,routeLabel:`${sFrom} → ${sTo}`,
                 origin:from,dest:to,via:null,multiHop:null};
            setManualTransport(res.gen*2);
          } else {
            const sr=findSmartRoute(sFrom,sTo);
            setSmartResult(sr||null);
            if(sr){
              const best=sr.cheapest;
              const allSrcs=[...new Set(best.segs.flatMap(s=>s.sources||[]))];
              
              // [수정] 환승(다구간) 시 터미널 명칭 매핑
              const buildMultiHopLabel = (segs) => {
                  if(!segs || !segs.length) return "";
                  const parts = [segs[0].depName || segs[0].from];
                  for(let i=0; i<segs.length; i++){
                      const arrN = segs[i].arrName || segs[i].to;
                      if(arrN !== parts[parts.length-1]) parts.push(arrN);
                  }
                  return parts.join(" → ");
              };
              
              res={gen:best.totalGen,pre:null,cost:best.totalGen,surcharge:0,shipCost:0,
                   sources:allSrcs,dr:best.path.join("→"),routeLabel:buildMultiHopLabel(best.segs),
                   origin:from,dest:to,via:null,multiHop:{segs:best.segs,path:best.path}};
              setManualTransport(best.totalGen*2);
            }
          }
        }
      } else {
        let sVia = BYPASS_DICT[viaN] || viaN;
        if(BYPASS_DICT[viaN]) bInfo.push(`✓ [${sVia}] 광역환승구역 (경유지 ${sVia} 기준 적용)`);
        setBypassInfo(bInfo);

        const s1=calcSegment(sFrom,sVia);const s2=calcSegment(sVia,sTo);
        if(s1&&s2){
          const totGen=s1.gen+s2.gen;const totSur=s1.surcharge+s2.surcharge;const totShip=s1.shipCost+s2.shipCost;
          
          // [수정] 경유지 렌더링 시 터미널 명칭 병합
          const l1 = s1.islandRouteLabel || `${s1.depName || sFrom} → ${s1.arrName || sVia}`;
          const l2 = s2.islandRouteLabel || `${s2.depName || sVia} → ${s2.arrName || sTo}`;
          const pArr = (`${l1} → ${l2}`).split(" → ");
          const dedup = pArr.filter((p, i) => i === 0 || p !== pArr[i-1]);

          res={gen:totGen,pre:(s1.pre||s1.gen)+(s2.pre||s2.gen),cost:totGen+totSur,surcharge:totSur,
               shipCost:totShip,sources:[...(s1.sources||[]),...(s2.sources||[])].filter((v,i,a)=>a.indexOf(v)===i),
               dr:`${sFrom}→${sVia}→${sTo}`,routeLabel:dedup.join(" → "),
               origin:from,dest:to,via:sVia,seg1:s1,seg2:s2,multiHop:null};
          setManualTransport((totGen+totSur)*2);setShipFare(totShip*2);
        }
      }
      setResult(res);
      if(res&&!res.multiHop){
        const subs=findSubResults(sFrom,sTo);
        if(isMokpoLivingZonePair(sFrom,sTo)) subs.depSubs=[makeZoneCandidate(),...(subs.depSubs||[])];
        setSubResults(subs);
      }
      else setSubResults({depSubs:[],arrSubs:[]});
      
      if(res) {
        addHistory(o,d,res.gen);
        setCalcSt("done");
      } else {
        setCalcSt("error_no_route");
      }
      }catch(err){
        console.error("performCalc 실패:",err);
        setResult(null);
        setSmartResult(null);
        setSubResults({depSubs:[],arrSubs:[]});
        setSelSub(null);
        setCalcSt("error_no_route");
      }
    },50);
  },[calcSegment,findSubResults,findSmartRoute,lookupRouteWithAlternatives,addHistory,modalSt,origin,dest,via]);

  /* 선택 등급 요금 */
  const selectedFare=useMemo(()=>{
    if(!result)return 0;
    const base=selSub||(result?{gen:result.gen,pre:result.pre}:null);
    if(!base)return 0;
    if(grade==="pre"&&base.pre)return base.pre;
    return base.gen;
  },[result,selSub,grade]);

  /* 여비 상세 계산 */
  const detailCost=useMemo(()=>{
    const daily=ded.gov_vehicle?12500:25000;
    const meal=ded.meal_3?0:ded.meal_1?16670:ded.meal_2?8330:ded.meal_half?12500:25000;
    const tCost=ded.transport_proof||ded.transport_gov_vehicle||ded.transport_passenger?0:(manualTransport!=null?manualTransport:selectedFare*2);
    const etc=shipFare||0;
    return{daily,meal,transport:tCost,etc,total:daily+meal+tCost+etc};
  },[ded,manualTransport,selectedFare,shipFare]);

  const mealLbl=()=>{if(ded.meal_1)return"(-8,330)";if(ded.meal_2)return"(-16,670)";if(ded.meal_3)return"(-25,000)";if(ded.meal_half)return"(-12,500)";return"";};

  const modalContent=(key)=>{
    const dTag=<b>{dest}</b>;
    if(key==="daily")return{title:"일비",desc:<span>출장지 {dTag} 내 소액 경비</span>,items:[{id:"gov_vehicle",label:"공용·임차차량(전세버스 등) 이용"}]};
    if(key==="meal")return{title:"식비",desc:"출장 중 식사 비용 감액",items:[{id:"meal_1",label:"1식 감액"},{id:"meal_2",label:"2식 감액"},{id:"meal_3",label:"전액 감액"},{id:"meal_half",label:"½ 감액"}]};
    if(key==="transport")return{title:"교통비",desc:<span>근무지→ {dTag} 이동비</span>,items:[{id:"transport_proof",label:"증거서류 미제출·부적정"},{id:"transport_gov_vehicle",label:"관용·임차차량 이용"},{id:"transport_passenger",label:"동료 차량 동승",sub:"동승자 교통비 미지급"}]};
  };

  const bothJNE=isJNE(nz(origin))&&isJNE(nz(dest));

  /* 지도용 노드 */
  const mapWaypoints=useMemo(()=>{
    // 세부지역 팝업이 열려 있으면 메인 맵 waypoints 차단 (ghost 방지)
    if(modalSt.type)return[];
    if(!result)return[];
    const bp=smartResult?.cheapest?.path||result?.multiHop?.path;
    if(bp&&bp.length>=2)return bp.map((city,i)=>({name:city,...getCityCoord(city),isHub:i>0&&i<bp.length-1}));
    if(result?.islandRouteLabel){
      // 섬 경로: 터미널명 파싱 금지 — 도시명(origin/dest)으로 직접 좌표 조회
      const toI=ISLAND_DB[nz(dest)];const fromI=ISLAND_DB[nz(origin)];
      const hub=(toI||fromI)?.hub;
      const pts=[{name:origin,...getCityCoord(nz(origin))}];
      if(hub&&hub!==nz(origin))pts.push({name:hub,...getCityCoord(hub),isHub:true});
      const dc=ISLAND_COORDS[nz(dest)]?{lat:ISLAND_COORDS[nz(dest)][0],lng:ISLAND_COORDS[nz(dest)][1]}:getCityCoord(nz(dest));
      if(nz(dest)!==nz(origin))pts.push({name:dest,...dc});
      return pts.filter((p,i,a)=>i===0||p.name!==a[i-1].name);
    }
    const fromI=ISLAND_DB[nz(origin)];const toI=ISLAND_DB[nz(dest)];
    const pts=[];
    pts.push({name:origin,...getCityCoord(nz(origin))});
    if(fromI&&fromI.hub!==nz(origin))pts.push({name:fromI.hub,...getCityCoord(fromI.hub),isHub:true});
    else if(toI&&toI.hub!==nz(dest))pts.push({name:toI.hub,...getCityCoord(toI.hub),isHub:true});
    pts.push({name:dest,...getCityCoord(nz(dest))});
    return pts.filter((p,i,a)=>i===0||p.name!==a[i-1].name);
  },[result,smartResult,origin,dest,getCityCoord]);

  useEffect(()=>{
    if(!result)return;
    if(selSub){
      const fare=grade==="pre"&&selSub.pre?selSub.pre:selSub.gen;
      setManualTransport(fare*2);
    } else {
      const fare=grade==="pre"&&result.pre?result.pre:result.gen;
      setManualTransport((fare+(result.surcharge||0))*2);
    }
  },[selSub,grade,result]);

  /* DetailContent - 여비계산 패널 (PC compact row 감액) */
  const [dailyRuleOpen,setDailyRuleOpen]=useState(false);
  const [mealRuleOpen,setMealRuleOpen]=useState(false);
  const [transRuleOpen,setTransRuleOpen]=useState(false);
  function DetailContent(){
    const DedRow=({active,onClick,label,desc})=>(
      <div style={{display:"grid",gridTemplateColumns:"108px minmax(0,1fr)",alignItems:"center",gap:10,minHeight:36,marginTop:7}}>
        <button onClick={onClick} style={{height:28,borderRadius:999,border:"1.5px solid",fontSize:11.5,fontWeight:900,cursor:"pointer",fontFamily:"var(--gm)",background:active?"#E8F2FF":"#FFFFFF",color:active?"#007AFF":"#4B5563",borderColor:active?"#7DBBFF":"#D9DEE8",boxShadow:active?"0 2px 6px rgba(0,122,255,.14)":"0 1px 2px rgba(15,23,42,.04)"}}>{active?"✓ ":""}{label}</button>
        <div style={{fontSize:12.2,fontWeight:750,color:"#374151",lineHeight:1.35,wordBreak:"keep-all"}}>{desc}</div>
      </div>
    );
    const RuleBlock=({open,items})=>open?(
      <div style={{marginTop:8,padding:"10px 12px",borderRadius:13,background:"#F8FAFC",border:"1px solid #E5E7EB"}}>
        {items.map((t,i)=><div key={i} style={{fontSize:12,fontWeight:650,color:"#475569",lineHeight:1.55,marginTop:i?4:0}}>• {t}</div>)}
      </div>
    ):null;
    const resetMeals=(n)=>{["meal_1","meal_2","meal_3","meal_half"].forEach(k=>n[k]=false);};
    return(
      <div style={{padding:"12px 16px 16px",display:"flex",flexDirection:"column",gap:12}}>

          <DedRow active={ded.gov_vehicle} label="관용차 감액" desc="공용·임차차량 이용 시 일비 1/2 적용" onClick={()=>setDed(p=>{const n={...p,gov_vehicle:!p.gov_vehicle};n.transport_gov_vehicle=n.gov_vehicle;if(n.gov_vehicle){n.transport_proof=false;n.transport_passenger=false;}return n;})}/>

          <RuleBlock open={dailyRuleOpen} items={["공용차량 또는 임차차량 이용 시 감액","근무지 외 출장: 일비 1/2 감액","근무지 내 출장: 출장비에서 10,000 감액","현장학습·연수 등 임차차량 이용 시 감액 여부 확인","동일 지역 장기 체재 시 체재기간에 따라 정액 감액"]}/>
        </section>
        <section style={{paddingBottom:12,borderBottom:"1px dashed #E1E5EE"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}><span style={{fontSize:17,fontWeight:900}}>식비</span><span style={{fontFamily:"var(--gm)",fontSize:21,fontWeight:900,color:"#111827"}}>{money(detailCost.meal)}</span></div>
          {[
            ["meal_1","1식 감액","1식을 제공받은 경우"],
            ["meal_2","2식 감액","2식을 제공받은 경우"],
            ["meal_3","전액 감액","식비 전액 미지급 대상"],
            ["meal_half","1/2 감액","식비 일부 감액 대상"],
          ].map(([id,label,desc])=><DedRow key={id} active={ded[id]} label={label} desc={desc} onClick={()=>setDed(p=>{const n={...p};const was=p[id];resetMeals(n);n[id]=!was;return n;})}/>) }
          <button onClick={()=>setMealRuleOpen(v=>!v)} style={{marginTop:6,border:"none",background:"transparent",padding:0,fontSize:12,fontWeight:900,color:"#007AFF",cursor:"pointer"}}>{mealRuleOpen?"감액 기준 접기 ▴":"감액 기준 보기 ▾"}</button>

        </section>
        <section style={{paddingBottom:12,borderBottom:"1px dashed #E1E5EE"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:17,fontWeight:900}}>교통비</span><span className={`tag-side ${tagStyle("왕복")}`}>왕복</span></div>
            {!(ded.transport_proof||ded.transport_gov_vehicle||ded.transport_passenger)?(
              <input type="tel" className="ship-input" style={{width:112,fontSize:20,height:42}} value={manualTransport==null||manualTransport===0?"":fmt(manualTransport)} onFocus={e=>e.target.select()} onChange={e=>{const v=e.target.value.replace(/,/g,"");setManualTransport(v===""?null:Number(v));}} placeholder="0"/>
            ):(<span style={{fontFamily:"var(--gm)",fontSize:19,fontWeight:900,color:"#AEAEB2"}}>0</span>)}
          </div>
          <DedRow active={ded.transport_proof} label="증빙 부적정" desc="증빙서류 미제출 또는 부적정" onClick={()=>setDed(p=>{const n={...p,transport_proof:!p.transport_proof};if(n.transport_proof){n.transport_gov_vehicle=false;n.transport_passenger=false;n.gov_vehicle=false;}return n;})}/>
          <DedRow active={ded.transport_gov_vehicle} label="관용·임차" desc="교통비 0 · 일비 1/2 자동 반영" onClick={()=>setDed(p=>{const n={...p,transport_gov_vehicle:!p.transport_gov_vehicle};n.gov_vehicle=n.transport_gov_vehicle;if(n.transport_gov_vehicle){n.transport_proof=false;n.transport_passenger=false;}return n;})}/>

              const icon=L.divIcon({className:"island-button-marker",html:`<div class="island-marker-btn">${name}</div>`,iconSize:null,iconAnchor:[24,16]});
              const mk=L.marker([coord[0],coord[1]],{icon,bubblingMouseEvents:false,keyboard:false,autoPanOnFocus:false}).addTo(im);
              const selectEv=(ev)=>{try{L.DomEvent.stop(ev);}catch(e){} handleSelect(name);};
              mk.on("pointerdown",selectEv).on("mousedown",selectEv).on("touchstart",selectEv).on("click",selectEv);
              setTimeout(()=>{
                const el=mk.getElement?.();
                if(!el)return;
                ["pointerdown","mousedown","touchstart","click"].forEach(evt=>{
                  el.addEventListener(evt,(ev)=>{ev.preventDefault();ev.stopPropagation();handleSelect(name);},{passive:false,capture:true});
                });
              },0);
            });
            try{
              const bounds=remoteItems.map(n=>ISLAND_COORDS[n]).filter(Boolean).map(c=>[c[0],c[1]]);
              if(bounds.length)im.fitBounds(bounds,{padding:[18,18],maxZoom:groupKey==="완도"?12:8});
            }catch(e){}
            insetMapRef.current=im;
            setTimeout(()=>im.invalidateSize(),80);
            return()=>{if(insetMapRef.current){insetMapRef.current.remove();insetMapRef.current=null;}};
          },[]);

          return(
            <div style={{position:"relative",flex:"1 1 0",minWidth:0,height:"100%",overflow:"hidden",borderRadius:"0 0 0 28px",background:"#DBEAFE"}}>
              <div ref={mainRef} style={{width:"100%",height:"100%"}}/>
              {remoteItems.length>0&&(
                <div style={{position:"absolute",zIndex:900,border:"2px dashed rgba(220,38,38,.75)",borderRadius:14,overflow:"hidden",background:"rgba(255,255,255,.9)",boxShadow:"0 4px 14px rgba(0,0,0,.18)",
                  ...(groupKey==="신안"?{left:12,top:46,width:150,height:260}:{right:12,bottom:14,width:170,height:120})}}>
                  <div style={{position:"absolute",left:6,top:5,zIndex:920,padding:"2px 7px",borderRadius:999,background:"rgba(255,255,255,.92)",border:"1px dashed rgba(220,38,38,.6)",fontSize:10,fontWeight:900,color:"#B91C1C",fontFamily:"var(--gm)"}}>원거리 도서</div>
                  <div ref={insetRef} style={{width:"100%",height:"100%"}}/>
                </div>
              )}
            </div>
          );
        };

        return(
          <div style={{position:"fixed",inset:0,zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(6px)"}}
            onClick={()=>{closeIslandPopup();}}>
            <div style={{
              background:"#fff",borderRadius:28,
              width:"calc(100vw - 40px)",
              height:isMiniMap?"calc(100vh - 60px)":"auto",
              maxWidth:isMiniMap?1000:380,
              maxHeight:isMiniMap?820:undefined,
              overflow:"hidden",
              boxShadow:"0 30px 60px rgba(0,0,0,0.35)",
              display:"flex",flexDirection:"column",
            }} onClick={e=>e.stopPropagation()}>
              {/* 헤더 */}
              <div style={{background:"linear-gradient(180deg,#288CFF,#007AFF)",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
                <div>
                  <span style={{fontFamily:"var(--gm)",fontSize:18,fontWeight:900,color:"#fff"}}>
                    {groupKey==="신안"?"🏝️ 신안 군도":groupKey==="완도"?"🦪 완도 해역":"세부 지역 선택"}
                  </span>
                  {isMiniMap&&<div style={{fontSize:11,color:"rgba(255,255,255,0.7)",marginTop:2}}>지도 마커 또는 오른쪽 목록을 클릭하세요</div>}
                </div>
                <button onClick={()=>{closeIslandPopup();}} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",cursor:"pointer",fontSize:18,borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              </div>

              {isMiniMap?(
                /* 데스크톱: 지도(확대) + 오른쪽 리스트 */
                <div style={{display:"flex",flex:1,minHeight:0}}>
                  <MiniMapPopup/>
                  {/* 우: 전체 목록 (작게, 스크롤) */}
                  <div style={{width:130,flexShrink:0,overflowY:"auto",borderLeft:"1px solid #F0F0F5",padding:"10px 7px",display:"flex",flexDirection:"column",gap:3,background:"#FAFAFA"}}>
                    <div style={{fontSize:10,fontWeight:800,color:"#AEAEB2",padding:"0 4px 6px",borderBottom:"1px solid #EBEBEB",marginBottom:4}}>전체 목록</div>
                    {modalSt.data.map(name=>(
                      <button key={name} onPointerDown={(e)=>{
                        e.preventDefault();e.stopPropagation();
                        selectPopupRegion(modalSt.type,name);
                      }} onClick={(e)=>{
                        e.preventDefault();e.stopPropagation();
                        selectPopupRegion(modalSt.type,name);
                      }} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 7px",borderRadius:9,background:"#fff",border:"1px solid #EBEBEB",cursor:"pointer",textAlign:"left",width:"100%",transition:"background .1s"}}>
                        <span style={{fontSize:15}}>{ICONS[name]||"🏝️"}</span>
                        <span style={{fontSize:11,fontWeight:700,color:"#374151",lineHeight:1.2}}>{popupDisplayName(name)}</span>
                      </button>
                    ))}
                  </div>
                </div>
              ):(
                /* 모바일: 기존 3열 그리드 */
                <div style={{padding:16,maxHeight:"60vh",overflowY:"auto"}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                    {modalSt.data.map(name=>(
                      <button key={name} onPointerDown={(e)=>{
                        e.preventDefault();e.stopPropagation();
                        selectPopupRegion(modalSt.type,name);
                      }} onClick={(e)=>{
                        e.preventDefault();e.stopPropagation();
                        selectPopupRegion(modalSt.type,name);
                      }} style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,padding:"14px 8px",borderRadius:16,background:"#F8F9FA",border:"1px solid transparent",cursor:"pointer"}}>
                        <span style={{fontSize:26}}>{ICONS[name]||"🏝️"}</span>
                        <span style={{fontSize:13,fontWeight:700,color:"#374151",textAlign:"center",lineHeight:1.3}}>{popupDisplayName(name)}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      })()}
      {activeModal&&(()=>{
        const mc=modalContent(activeModal);if(!mc)return null;
        return(
          <div className="modal-bg" onClick={()=>setActiveModal(null)}>
            <div className="modal-box" onClick={e=>e.stopPropagation()}>
              <div className="modal-hdr">
                <div>
                  <div style={{fontFamily:"var(--gm)",fontSize:17,fontWeight:900,color:"#fff"}}>{mc.title} 감액</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.75)",marginTop:2}}>{mc.desc}</div>
                </div>
                <button onClick={()=>setActiveModal(null)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:18}}>✕</button>
              </div>
              <div className="modal-body" style={{display:"flex",flexDirection:"column",gap:0}}>
                {mc.items.map(item=>(
                  <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #F2F2F7"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14}}>{item.label}</div>
                      {item.sub&&<div style={{fontSize:11,color:"#AEAEB2",fontWeight:600}}>{item.sub}</div>}
                    </div>
                    <Toggle on={ded[item.id]} onChange={()=>setDed(prev=>{
                      const n={...prev};
                      if(["meal_1","meal_2","meal_3","meal_half"].includes(item.id)&&!prev[item.id])
                        ["meal_1","meal_2","meal_3","meal_half"].forEach(k=>n[k]=false);
                      n[item.id]=!prev[item.id];
                      // 일비 관용차 ↔ 교통비 관용차 양방향 연동
                      if(item.id==="gov_vehicle"){
                        n.transport_gov_vehicle=n.gov_vehicle;
                        if(n.gov_vehicle){n.transport_proof=false;n.transport_passenger=false;}
                      }
                      if(item.id==="transport_gov_vehicle"){
                        n.gov_vehicle=n.transport_gov_vehicle;
                        // 교통비 관용차 선택 시 다른 교통비 감액 해제 (배타)
                        if(n.transport_gov_vehicle){n.transport_proof=false;n.transport_passenger=false;}
                      }
                      if(item.id==="transport_proof"&&n.transport_proof){n.transport_gov_vehicle=false;n.transport_passenger=false;n.gov_vehicle=false;}
                      if(item.id==="transport_passenger"&&n.transport_passenger){n.transport_gov_vehicle=false;n.transport_proof=false;n.gov_vehicle=false;}
                      return n;
                    })}/>
                  </div>
                ))}
                <button onClick={()=>setActiveModal(null)} className="confirm-btn">확인</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );


};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
